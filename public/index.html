<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Smart Listing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f4f4f5;
      --bubble: #f1f1f0;
      --text: #18181b;
      --text-2: #6b7280;
      --text-3: #a1a1aa;
      --border: #ececec;
      --accent: #0F3D2E;
      --gold: #C9A23F;
    }

    * { box-sizing: border-box; }

    input, textarea, select {
      font-size: 16px;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .listing {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
    }

    .topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: calc(10px + env(safe-area-inset-top)) 16px 10px;
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
    }

    .topbar-start {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-lockup {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }

    .zeli-mark {
      display: block;
      line-height: 0;
      flex-shrink: 0;
    }

    .zeli-mark svg {
      width: 28px;
      height: 28px;
      display: block;
    }

    .zeli-word {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--accent);
      letter-spacing: -0.03em;
      text-transform: lowercase;
      line-height: 1;
    }

    .brand {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .topbar-meta {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .mas-de {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-3);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mas-de:hover { text-decoration: underline; }

    .share {
      flex-shrink: 0;
      border: none;
      background: transparent;
      font-size: 20px;
      line-height: 1;
      padding: 6px;
      cursor: pointer;
      color: var(--text);
    }

    .scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .photo {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-soft);
      color: var(--text-3);
    }

    .photo img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }

    .photo-count {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(24, 24, 27, 0.55);
      color: #fff;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 8px;
    }

    .thumbs {
      display: flex;
      gap: 6px;
      padding: 8px 16px 4px;
    }

    .thumb {
      flex: 1;
      height: 38px;
      background: var(--bg-soft);
      border-radius: 6px;
    }

    .thumb.active {
      border: 0.5px solid #e3e3e6;
    }

    .listing-head {
      padding: 18px 20px 14px;
    }

    .price {
      font-size: 23px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .facts-line {
      font-size: 14px;
      color: var(--text-2);
      margin-top: 4px;
    }

    .who {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 16px;
      border-bottom: 0.5px solid var(--border);
    }

    .who .name {
      font-size: 14px;
      color: var(--text-2);
    }

    .who .status {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-3);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-3);
    }

    .avatar {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      line-height: 0;
    }

    .avatar svg {
      width: 28px;
      height: 28px;
      display: block;
    }

    .avatar.sm svg {
      width: 26px;
      height: 26px;
    }

    .avatar.sm {
      width: 26px;
      height: 26px;
    }

    #chat {
      padding: 22px 20px 8px;
      display: flex;
      flex-direction: column;
    }

    .turn-bot {
      display: flex;
      gap: 11px;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .turn-bot .body {
      font-size: 15.5px;
      line-height: 1.55;
      color: var(--text);
      max-width: 86%;
      padding-top: 2px;
    }

    .turn-user {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 24px;
    }

    .turn-user .body {
      background: var(--bubble);
      color: var(--text);
      padding: 11px 15px;
      border-radius: 20px 20px 6px 20px;
      font-size: 15.5px;
      line-height: 1.55;
      max-width: 78%;
    }

    .typing-dots {
      color: var(--text-3);
      letter-spacing: 3px;
    }

    #handoff-slot {
      padding: 0 20px 8px;
    }

    .handoff-turn {
      margin-bottom: 24px;
    }

    .handoff-turn .handoff {
      flex: 1;
      max-width: 86%;
      padding-top: 2px;
    }

    .handoff p {
      font-size: 15.5px;
      line-height: 1.55;
      color: var(--text);
      margin: 0 0 12px;
    }

    .wa-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 0.5px solid #e3e3e6;
      padding: 11px 15px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
    }

    .composer {
      flex-shrink: 0;
      background: var(--bg);
      border-top: 0.5px solid var(--border);
    }

    #chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 20px 4px;
    }

    .chip {
      font-size: 14px;
      color: var(--text-2);
      border: 0.5px solid #e3e3e6;
      background: var(--bg);
      border-radius: 20px;
      padding: 8px 15px;
      cursor: pointer;
      font-family: inherit;
    }

    .chip:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .composer-form {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px calc(16px + env(safe-area-inset-bottom));
    }

    #input {
      flex: 1;
      height: 46px;
      border: 0.5px solid #e3e3e6;
      border-radius: 23px;
      padding: 0 18px;
      color: var(--text);
      background: var(--bg);
      font-family: inherit;
      outline: none;
    }

    #input::placeholder { color: var(--text-3); }

    #input:disabled { opacity: 0.6; }

    #send {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    #send:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .banner {
      max-width: 480px;
      margin: 0 auto;
      padding: 12px 16px;
      background: var(--bg-soft);
      border-bottom: 0.5px solid var(--border);
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.45;
    }

    .banner.error {
      color: var(--text);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <h1 class="sr-only">Smart listing — asistente para compradores</h1>

  <div id="banner" class="banner hidden"></div>

  <div class="listing" id="app">
    <header class="topbar">
      <div class="topbar-start">
        <div class="logo-lockup" aria-hidden="true">
          <span class="zeli-mark" id="top-mark"></span>
          <span class="zeli-word">zeli</span>
        </div>
        <div class="topbar-meta">
          <div class="brand" id="brand">…</div>
          <a id="mas-de" class="mas-de hidden" href="#">más de …</a>
        </div>
      </div>
      <button type="button" class="share" id="share-btn" aria-label="Compartir">⤴</button>
    </header>
    <div class="scroll" id="scroll">
      <div class="photo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.6"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span class="photo-count">1 / 8</span>
      </div>
      <div class="thumbs" aria-hidden="true">
        <div class="thumb active"></div>
        <div class="thumb"></div>
        <div class="thumb"></div>
        <div class="thumb"></div>
      </div>

      <div class="listing-head">
        <div class="price" id="price">—</div>
        <div class="facts-line" id="facts-line">Cargando…</div>
      </div>

      <div class="who">
        <div class="avatar sm" id="who-mark" aria-hidden="true"></div>
        <span class="name" id="assistant-label">Zeli</span>
        <span class="status">
          <span class="dot"></span>
          en línea
        </span>
      </div>

      <div id="chat" role="log" aria-live="polite" aria-relevant="additions"></div>
      <div id="handoff-slot"></div>
    </div>

    <div class="composer">
      <div id="chips"></div>
      <form class="composer-form" id="composer">
        <input
          id="input"
          type="text"
          placeholder="Escribe tu pregunta…"
          autocomplete="off"
          maxlength="500"
          disabled
        >
        <button type="submit" id="send" aria-label="Enviar" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
        </button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      var DEFAULT_CHIPS = [
        "¿Está disponible?",
        "¿Cuánto es el PH?",
        "¿Le da el sol en la tarde?",
        "¿Puedo verlo este fin?",
      ];

      var ZELI_MARK_INNER =
        '<circle cx="50" cy="50" r="47" fill="#F4F0E4" stroke="rgba(15,61,46,0.28)" stroke-width="3"/>' +
        '<rect x="24" y="29" width="52" height="11" rx="3" fill="#0F3D2E"/>' +
        '<rect x="24" y="60" width="52" height="11" rx="3" fill="#0F3D2E"/>' +
        '<polygon points="62,40 76,40 38,60 24,60" fill="#0F3D2E"/>' +
        '<circle cx="66" cy="47" r="4" fill="#C9A23F"/>';

      function zeliMarkSvg(size) {
        return (
          '<svg viewBox="0 0 100 100" width="' + size + '" height="' + size + '" aria-hidden="true">' +
          ZELI_MARK_INNER +
          "</svg>"
        );
      }

      function mountZeliMark(el, size) {
        el.innerHTML = zeliMarkSvg(size);
      }

      mountZeliMark(document.getElementById("top-mark"), 28);
      mountZeliMark(document.getElementById("who-mark"), 26);

      var params = new URLSearchParams(location.search);

      function resolveListingRef() {
        var fromQuery = params.get("listing") || params.get("listingId");
        if (fromQuery) return fromQuery;
        var path = location.pathname.replace(/^\//, "").replace(/\/$/, "");
        if (
          path &&
          path !== "index.html" &&
          path !== "storefront.html" &&
          !path.startsWith("b/")
        ) {
          return decodeURIComponent(path);
        }
        return "listing-sf-demo";
      }

      var listingRef = resolveListingRef();
      var listingId = listingRef;

      var state = {
        listing: null,
        conversationId: null,
        busy: false,
      };

      function ensureConversation(id) {
        var key = "zeli-conv-" + id;
        var cid = sessionStorage.getItem(key);
        if (!cid) {
          cid = crypto.randomUUID();
          sessionStorage.setItem(key, cid);
        }
        state.conversationId = cid;
      }

      var chat = document.getElementById("chat");
      var scrollEl = document.getElementById("scroll");
      var chipsEl = document.getElementById("chips");
      var handoffSlot = document.getElementById("handoff-slot");
      var input = document.getElementById("input");
      var sendBtn = document.getElementById("send");
      var banner = document.getElementById("banner");
      var composer = document.getElementById("composer");
      var shareBtn = document.getElementById("share-btn");

      function mkAvatar() {
        var el = document.createElement("div");
        el.className = "avatar";
        el.setAttribute("aria-hidden", "true");
        el.innerHTML = zeliMarkSvg(28);
        return el;
      }

      function mkTurn(text, who) {
        var turn = document.createElement("div");
        var body = document.createElement("div");
        body.className = "body";
        body.textContent = text;

        if (who === "user") {
          turn.className = "turn-user";
          turn.appendChild(body);
        } else {
          turn.className = "turn-bot";
          turn.appendChild(mkAvatar());
          turn.appendChild(body);
        }
        return turn;
      }

      function mkTyping() {
        var turn = document.createElement("div");
        turn.className = "turn-bot";
        turn.appendChild(mkAvatar());
        var body = document.createElement("div");
        body.className = "body typing-dots";
        body.textContent = "•••";
        turn.appendChild(body);
        return turn;
      }

      function shareListing() {
        var url = location.href;
        var business =
          (state.listing && state.listing.broker && state.listing.broker.agency) ||
          document.getElementById("brand").textContent;
        var price = document.getElementById("price").textContent;
        var factsLine = document.getElementById("facts-line").textContent;
        var payload = {
          title: business + " — " + price,
          text: factsLine,
          url: url,
        };

        if (navigator.share) {
          navigator.share(payload).catch(function (err) {
            if (err && err.name !== "AbortError") copyShareLink(url);
          });
        } else {
          copyShareLink(url);
        }
      }

      function copyShareLink(url) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function () {
            showBanner("Enlace copiado — compártelo por WhatsApp.", false);
          }).catch(function () {
            showBanner(url, false);
          });
        } else {
          showBanner(url, false);
        }
      }

      shareBtn.addEventListener("click", shareListing);

      function showBanner(text, isError) {
        banner.textContent = text;
        banner.classList.toggle("error", !!isError);
        banner.classList.remove("hidden");
      }

      function fmtPrice(n) {
        if (n == null) return "Precio a consultar";
        return "$" + Number(n).toLocaleString("en-US");
      }

      function fmtFactsLine(data) {
        var parts = [];
        if (data.beds != null) parts.push(data.beds + " recámaras");
        if (data.location) parts.push(data.location);
        if (data.area_m2 != null) parts.push(data.area_m2 + " m²");
        return parts.length ? parts.join(" · ") : "Panamá";
      }

      function renderListing(data) {
        document.getElementById("price").textContent = fmtPrice(data.price);
        document.getElementById("facts-line").textContent = fmtFactsLine(data);

        var business =
          data.broker && data.broker.agency ? data.broker.agency : "Inmobiliaria";
        document.getElementById("brand").textContent = business;

        var masDe = document.getElementById("mas-de");
        if (data.storefront && data.storefront.href) {
          masDe.textContent = "más de " + business;
          masDe.href = data.storefront.href;
          masDe.classList.remove("hidden");
        } else {
          masDe.classList.add("hidden");
        }

        var principal = data.broker && data.broker.name ? data.broker.name : "el corredor";
        document.getElementById("assistant-label").textContent =
          "Zeli · asistente de " + principal;

        var greet =
          "¡Hola! Soy Zeli, la asistente personal de " + principal +
          ". Pregúntame lo que sea de este apartamento — te respondo al instante.";
        chat.innerHTML = "";
        appendToChat(mkTurn(greet, "agent"));

        renderChips(DEFAULT_CHIPS);
        input.disabled = false;
        sendBtn.disabled = false;
      }

      function renderChips(labels) {
        chipsEl.innerHTML = "";
        labels.forEach(function (label) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "chip";
          btn.textContent = label;
          btn.addEventListener("click", function () {
            sendMessage(label, btn);
          });
          chipsEl.appendChild(btn);
        });
      }

      function scrollToBottom() {
        requestAnimationFrame(function () {
          if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
        });
      }

      function appendToChat(node) {
        chat.appendChild(node);
        scrollToBottom();
        return node;
      }

      function setBusy(on) {
        state.busy = on;
        input.disabled = on || !state.listing;
        sendBtn.disabled = on || !state.listing;
      }

      function mkHandoff(whatsappUrl) {
        handoffSlot.innerHTML = "";
        var turn = document.createElement("div");
        turn.className = "turn-bot handoff-turn";
        turn.appendChild(mkAvatar());

        var card = document.createElement("div");
        card.className = "handoff";

        var p = document.createElement("p");
        var broker = state.listing && state.listing.broker;
        var name = broker && broker.name ? broker.name : "el corredor";
        p.textContent =
          "Perfecto. Te conecto con " + name + " por WhatsApp para coordinar la visita.";

        var a = document.createElement("a");
        a.className = "wa-btn";
        a.href = whatsappUrl;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = "Continuar en WhatsApp";

        card.appendChild(p);
        card.appendChild(a);
        turn.appendChild(card);
        handoffSlot.appendChild(turn);
        scrollToBottom();
      }

      async function sendMessage(text, chipBtn) {
        var q = (text || "").trim();
        if (!q || state.busy || !state.listing) return;

        if (chipBtn) {
          chipBtn.disabled = true;
          input.blur();
        }

        appendToChat(mkTurn(q, "user"));
        input.value = "";
        handoffSlot.innerHTML = "";

        var typing = mkTyping();
        appendToChat(typing);
        setBusy(true);

        try {
          var res = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              listingId: listingId,
              conversationId: state.conversationId,
              message: q,
            }),
          });

          var data = await res.json();
          typing.remove();

          if (!res.ok) {
            appendToChat(mkTurn("Algo salió mal. Intenta de nuevo en un momento.", "agent"));
            return;
          }

          appendToChat(mkTurn(data.reply, "agent"));

          if (data.decision === "handoff" && data.whatsapp) {
            mkHandoff(data.whatsapp);
          }
        } catch (_) {
          typing.remove();
          appendToChat(
            mkTurn("No pude conectar. Revisa tu internet e intenta de nuevo.", "agent"),
          );
        } finally {
          setBusy(false);
          if (!chipBtn) input.focus();
        }
      }

      composer.addEventListener("submit", function (e) {
        e.preventDefault();
        sendMessage(input.value);
      });

      async function init() {
        try {
          var res = await fetch("/api/listings/" + encodeURIComponent(listingRef));
          var data = await res.json();

          if (!res.ok) {
            showBanner(
              "Listing no encontrado. Usa ?listing=ID en la URL o /slug en la ruta.",
              true,
            );
            document.getElementById("facts-line").textContent = "Listing no disponible";
            return;
          }

          state.listing = data;
          listingId = data.id;
          ensureConversation(listingId);
          renderListing(data);

          if (
            listingRef === "listing-sf-demo" &&
            !params.get("listing") &&
            !params.get("listingId") &&
            location.pathname.replace(/^\//, "") === ""
          ) {
            showBanner("Demo: listing-sf-demo. Agrega ?listing=TU_ID para otro listing.");
          }
        } catch (_) {
          showBanner("No se pudo cargar el listing. ¿Está corriendo el worker?", true);
          document.getElementById("facts-line").textContent = "Error de conexión";
        }
      }

      init();
    })();
  </script>
</body>
</html>
